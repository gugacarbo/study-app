# Gate de CI do CASA Standard (§3/§8) — instalado pelo casa-init em
# .github/workflows/docs-check.yml quando o repo tem remote.
name: docs-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validar docs (CASA Standard §8)
        run: python3 scripts/docs-check
